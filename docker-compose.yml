services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: resumeanalyzer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  resume-api:
    build:
      context: .
      dockerfile: src/ResumeAnalyzer.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=resumeanalyzer;Username=postgres;Password=postgres
      - AI_Gemini_ApiKey=${GEMINI_API_KEY}
      - AI_Claude_ApiKey=${CLAUDE_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: